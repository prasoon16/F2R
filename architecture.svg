  <line x1="346" y1="444" x2="346" y2="452" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="216" y1="528" x2="258" y2="510" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="216" y1="540" x2="426" y2="510" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="335" y1="530" x2="335" y2="552" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="532" y1="530" x2="532" y2="552" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

